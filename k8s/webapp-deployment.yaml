apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
      - name: webapp
        image: bkimminich/juice-shop  # Using a reliable test image to ensure it runs
        ports:
        - containerPort: 3000
